<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
    <clipPath id="roundedSquare">
      <rect x="16" y="16" width="480" height="480" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- 둥근 사각형 글래스 배경 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#f5f5f5"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#glass)" stroke="#e0e0e0" stroke-width="1"/>

  <g clip-path="url(#roundedSquare)">
    <!-- 맵 핀 외곽 (빨간색) -->
    <path d="M256 440 L256 420 C256 420 256 420 256 420
             L215 360
             C155 280 120 240 120 190
             C120 115 182 56 256 56
             C330 56 392 115 392 190
             C392 240 357 280 297 360
             L256 420 Z"
          fill="#EF4444" stroke="none"/>

    <!-- 핀 안쪽 흰색 -->
    <circle cx="256" cy="195" r="115" fill="white"/>

    <!-- 쇼핑백 손잡이 -->
    <path d="M220 155 C220 125 292 125 292 155" fill="none" stroke="#EF4444" stroke-width="12" stroke-linecap="round"/>

    <!-- 4분할 쇼핑백 몸체 -->
    <!-- 빨간색 (좌상) -->
    <path d="M165 175 L256 175 L256 255 L165 255 Z" fill="#EF4444"/>
    <!-- 보라색 (우상) -->
    <path d="M256 175 L347 175 L347 255 L256 255 Z" fill="#7C3AED"/>
    <!-- 초록색 (좌하) -->
    <path d="M165 255 L256 255 L256 335 L165 335 Z" fill="#22C55E"/>
    <!-- 노란색 (우하) -->
    <path d="M256 255 L347 255 L347 335 L256 335 Z" fill="#EAB308"/>

    <!-- 쇼핑백 둥근 모서리 클리핑 -->
    <rect x="165" y="175" width="182" height="160" rx="20" ry="20" fill="none" stroke="white" stroke-width="0"/>

    <!-- 아이콘들 -->
    <!-- 빨간 섹션: 커피콩/올리브영 -->
    <circle cx="210" cy="215" r="14" fill="white" fill-opacity="0.9"/>
    <ellipse cx="210" cy="215" rx="7" ry="10" fill="none" stroke="#EF4444" stroke-width="2"/>
    <line x1="207" y1="209" x2="213" y2="221" stroke="#EF4444" stroke-width="1.5"/>

    <!-- 보라 섹션: 음료+건물/편의점 -->
    <!-- 음료컵 -->
    <rect x="285" y="198" width="16" height="22" rx="2" fill="white" fill-opacity="0.9"/>
    <rect x="283" y="195" width="20" height="5" rx="2" fill="white" fill-opacity="0.9"/>
    <line x1="290" y1="195" x2="295" y2="186" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <!-- 작은 건물 -->
    <rect x="310" y="207" width="14" height="15" rx="1" fill="white" fill-opacity="0.9"/>
    <rect x="307" y="205" width="20" height="4" rx="1" fill="white" fill-opacity="0.9"/>

    <!-- 초록 섹션: 장바구니 -->
    <path d="M195 285 L225 285 L222 305 L198 305 Z" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round" opacity="0.9"/>
    <line x1="193" y1="285" x2="228" y2="285" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <line x1="200" y1="282" x2="195" y2="275" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

    <!-- 노란 섹션: 별/영화관 -->
    <polygon points="300,275 306,290 322,292 310,303 313,318 300,310 287,318 290,303 278,292 294,290"
             fill="#92400E" fill-opacity="0.8"/>

    <!-- 핀 그림자 -->
    <ellipse cx="256" cy="445" rx="30" ry="8" fill="#EF4444" fill-opacity="0.3"/>
    <!-- 핀 꼭지점 -->
    <polygon points="240,400 256,440 272,400" fill="#EF4444"/>
  </g>
</svg>
